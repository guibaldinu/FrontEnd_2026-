<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogadores da Copa 2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .subtitulo {
            text-align: center;
            color: #90caf9;
            font-size: 15px;
            margin-bottom: 36px;
        }

        .btn-wrapper {
            text-align: center;
            margin-bottom: 36px;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #f9a825, #fb8c00);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(251, 140, 0, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 28px rgba(251, 140, 0, 0.5);
        }

        /* ESSA DIV É O MAIS IMPORTANTE */
        #jogadores {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            width: 220px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            display: block;
        }

        .card p {
            font-size: 13px;
            color: #333;
            padding: 6px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card p:last-child {
            border-bottom: none;
            padding-bottom: 12px;
        }

        .card strong {
            color: #1565c0;
        }
    </style>
</head>
<body>

    <h1>⚽ Jogadores da Copa 2026</h1>
    <p class="subtitulo">Clique no botão para adicionar um jogador à lista</p>

    <div class="btn-wrapper">
        <button onclick="add()">+ Adicionar Jogador</button>
    </div>

    <!-- ESSA DIV É O MAIS IMPORTANTE -->
    <div id="jogadores"></div>

    <!-- script externo com a função add() usando createElement -->
    <script src="script.js"></script>

</body>
</html>
