<!DOCTYPE html>
<html lang="pt-br" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bichinho Virtual Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Configuração do fundo responsivo no body */
        body {
            background-image: url('background.png'); /* Fundo inicial (dia) */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
            transition: background-image 1s ease-in-out; /* Transição suave entre dia e noite (Desafio) */
        }

        /* Garantir que o conteúdo fique centralizado e visível sobre o fundo */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(1px); /* Leve blur no fundo para destacar o boneco, opcional */
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <header class="w-full flex items-center justify-start p-4 gap-4 bg-base-100/70 shadow-md">
            <div class="avatar">
                <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                    <img src="cria_eat.png" alt="Avatar da criatura" />
                </div>
            </div>
            <div class="form-control">
                <input 
                    type="text" 
                    placeholder="Nome da criatura..." 
                    class="input input-bordered input-secondary w-full max-w-xs bg-base-100"
                />
            </div>
            
            <div class="form-control flex-row gap-2 items-center ml-auto">
                <span class="label-text">Dia</span> 
                <input type="checkbox" class="toggle toggle-primary" id="toggleTempo" onclick="alternarTempoManual()" />
                <span class="label-text">Noite</span>
            </div>
        </header>

        <main class="flex flex-col items-center justify-center flex-grow w-full px-4 mt-10 relative">
            
            <img 
                id="mainImage"
                src="cria_norm.png"
                alt="Bichinho Virtual"
                class="w-full max-w-md h-auto mb-12 drop-shadow-2xl"
            />

            <div class="flex justify-center w-full mb-10">
                <img 
                    id="btnImage"
                    src="btn_frut.png"
                    alt="Botão Alimentar"
                    class="w-1/3 max-w-[150px] h-auto cursor-pointer active:scale-95 transition-transform duration-150 hover:scale-110"
                    onclick="alimentar()"
                />
            </div>

            <button 
                onclick="document.getElementById('modal-ferlini').showModal()" 
                class="absolute bottom-2 right-2 opacity-5 hover:opacity-100 transition-opacity btn btn-ghost btn-xs text-xs">
                ?
            </button>
        </main>
    </div>

    <dialog id="modal-ferlini" class="modal">
        <div class="modal-box text-center">
            <h3 class="font-bold text-lg mb-4">Parabéns, você achou o Gostosinho! (+1 Ponto)</h3>
            <img src="ferlini.png" alt="Ferlini" class="mx-auto rounded-lg shadow-lg mb-4 max-w-full h-auto">
            <div class="modal-action justify-center">
                <form method="dialog">
                    <button class="btn btn-primary">Fechar</button>
                </form>
            </div>
        </div>
    </dialog>

    <script>
        // --- Configurações e Variáveis Globais ---
        
        // Referências dos elementos HTML
        const img = document.getElementById("mainImage");
        const toggleTempo = document.getElementById("toggleTempo");

        // Definição dos nomes dos arquivos de imagem (conforme solicitado na Atv 1)
        const imagens = {
            normal: "cria_norm.png",
            puto: "cria_puto.png",
            morto: "cria_morto.png",
            clicado: "cria_eat.png", // Estado COMENDO
            feliz: "cria_feliz.png"  // Estado ALIMENTADO
        };

        // Arquivos de fundo (Atividade Próxima Etapa)
        const fundoDia = "background.png";
        const fundoNoite = "background_noite.png";

        // Variáveis de controle do estado do jogo
        let contador = 0;       // Contador de tempo para fome/morte
        let estaMorto = false;  // Flag para verificar se a criatura morreu
        
        // Variáveis para armazenar os timeouts (necessário para limpar na função alimentar)
        let timeoutClique = null;
        let timeoutBack = null;
        
        // Variável para o intervalo do ciclo dia/noite
        let intervaloTempo = null;
        let horas = 0; // "Relógio" do jogo

        // --- Função Principal de Controle do Ciclo de Vida ---
        function controle() {
            // Executa a lógica a cada 1 segundo (1000ms)
            setInterval(() => {
                if (estaMorto) return; // Se está morto, para a contagem de fome

                contador++;
                console.log("Tempo sem comer:", contador);

                // Lógica de mudança de estado baseada no tempo
                if (contador >= 15) {
                    // Após 15 segundos, morre
                    img.src = imagens.morto;
                    estaMorto = true;
                    console.log("A criatura morreu. :(");
                } else if (contador >= 7) {
                    // Após 7 segundos, fica bravo (com fome)
                    img.src = imagens.puto;
                    console.log("A criatura está com fome (PUTO).");
                } else {
                    // Estado normal
                    // Garante que volta para o normal se não estiver nos outros estados
                    if(img.src.indexOf(imagens.normal) === -1 && 
                       img.src.indexOf(imagens.clicado) === -1 && 
                       img.src.indexOf(imagens.feliz) === -1) {
                         img.src = imagens.normal;
                    }
                }
            }, 1000);
        }

        // --- 🍓 Função Alimentar ---
        // Chamada pelo onclick na imagem 'btnImage'
        function alimentar() {
            // --- Desafio: Impedir alimentar após morte ---
            if (estaMorto) {
                console.log("Tarde demais. A criatura está morta.");
                alert("Você não pode alimentar uma criatura morta. Recarregue a página para tentar novamente.");
                return; // Sai da função, não executa o resto do código
            }

            // 1. Muda para imagem COMENDO (clicado) instantaneamente
            img.src = imagens.clicado;
            
            // 2. Reseta o contador de fome
            contador = 0;
            console.log("Comendo. Contador resetado.");

            // 3. Limpa timeouts anteriores para evitar bugs visual se clicar rápido
            if (timeoutClique) clearTimeout(timeoutClique);
            if (timeoutBack) clearTimeout(timeoutBack);

            // 4. Agenda a mudança para o estado FELIZ (ALIMENTADO) após 1 segundo (1000ms)
            timeoutClique = setTimeout(() => {
                img.src = imagens.feliz;
                console.log("Alimentado e feliz.");

                // 5. Agenda o retorno para o estado NORMAL após mais 2 segundos (2000ms)
                timeoutBack = setTimeout(() => {
                    if (!estaMorto) { // Só volta se não tiver morrido nesse meio tempo (improvável com contador resetado)
                        img.src = imagens.normal;
                        console.log("De volta ao normal.");
                    }
                }, 2000);

            }, 1000);
        }

        // --- 🌍 Atividade: Criando o Ambiente e Ciclo Dia/Noite ---

        // Função para atualizar o fundo baseada nas "horas" do jogo
        function definirFundo(h) {
            // Lógica: 0-11 dia (fundoDia), 12-23 noite (fundoNoite)
            if (h >= 12) {
                document.body.style.backgroundImage = `url('${fundoNoite}')`;
                // Sincroniza o toggle do header se existir
                if(toggleTempo) toggleTempo.checked = true;
            } else {
                document.body.style.backgroundImage = `url('${fundoDia}')`;
                if(toggleTempo) toggleTempo.checked = false;
            }
        }

        function atualizarFundoAutomatico() {
            // Limpa intervalo anterior se houver
            if (intervaloTempo) clearInterval(intervaloTempo);

            // Inicia o "relógio". Cada 100ms equivale a 1 "hora" do jogo para teste rápido.
            intervaloTempo = setInterval(() => {
                horas++;
                console.log("Horas do jogo:", horas);
                
                definirFundo(horas);

                // Reseta o ciclo após 24 "horas"
                if (horas >= 24) horas = 0;

            }, 500); // Aumentei para 500ms para não piscar muito rápido, ajuste conforme necessário
        }

        // --- Desafio bônus: Toggle para alternar manualmente ---
        function alternarTempoManual() {
            // Para o ciclo automático para não conflitar
            if (intervaloTempo) clearInterval(intervaloTempo);
            
            if (toggleTempo.checked) {
                horas = 12; // Define como início da noite
            } else {
                horas = 0; // Define como início do dia
            }
            definirFundo(horas);
        }

        // --- Inicialização ---
        // Inicia a lógica da criatura e o ciclo de fundo ao carregar a página
        controle();
        atualizarFundoAutomatico();

    </script>
</body>
</html>
