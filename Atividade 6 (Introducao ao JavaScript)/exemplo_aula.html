<div id="pagina">
<script>
     /* Manipulando Variaveis*/
    const valor = 1;
    console.log("Meu Valor" + valor);

    let adcione = 1;
    console.log("Meu Valor" + valor + adcione);
    
    console.log("Meu Valor" + (valor + adcione));

    var  outra = "banana";
    console.log("Meu Valor" + valor + outra);
    
    outra = true;
    console.log("Meu Valor" + valor + !outra);
    console.log(outra);

</script>
    
    <h1> Meu Carro, um obj JS </h1>

<script>
   class Carro {
        constructor(marca, modelo, caracteristicas) {
        this.Marca = marca;

        this.Caracteristicas = caracteristicas;
        }
        exibirDetalhes() {
            console.log(`Marca: ${this.Marca} - Modelo: ${this.Modelo}`)
            document.getElementById("car").innerHTML = (`Marca: ${this.Marca} - Modelo: ${this.Modelo}`)
        }
        }
        const carro1 = new Carro("Ford", "Ka", ["Preto", 1.0, "2 portas"]);
