<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de CPF</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 8px; }
        p  { color: #888; font-size: 14px; margin-bottom: 24px; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
            letter-spacing: 2px;
            box-sizing: border-box;
        }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #1a252f; }
        #resultado {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            display: none;
        }
        .valido   { background-color: #d4edda; color: #155724; }
        .invalido { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Validador de CPF</h1>
        <p>Digite um CPF para verificar se é válido ou inválido.</p>
        <input type="text" id="cpfInput" placeholder="000.000.000-00" maxlength="14" oninput="mascararCPF(this)">
        <button onclick="validarCPF()">Validar</button>
        <div id="resultado"></div>
    </div>

    <script>
        function mascararCPF(input) {
            let v = input.value.replace(/\D/g, '').substring(0, 11);
            if (v.length > 9)      v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{1,2})$/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/^(\d{3})(\d{3})(\d{1,3})$/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/^(\d{3})(\d{1,3})$/, '$1.$2');
            input.value = v;
        }

        function validarCPF() {
            const cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
            const el  = document.getElementById('resultado');
            el.style.display = 'block';
            el.className = '';

            if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
                el.textContent = '❌ CPF Inválido!';
                el.classList.add('invalido');
                return;
            }

            const digitos = cpf.split('').map(Number);

            // 1º dígito verificador
            let soma = 0;
            for (let i = 0; i < 9; i++) soma += digitos[i] * (10 - i);
            let resto = (soma * 10) % 11;
            if (resto === 10) resto = 0;
            if (resto !== digitos[9]) {
                el.textContent = '❌ CPF Inválido!';
                el.classList.add('invalido');
                return;
            }

            // 2º dígito verificador
            soma = 0;
            for (let i = 0; i < 10; i++) soma += digitos[i] * (11 - i);
            resto = (soma * 10) % 11;
            if (resto === 10) resto = 0;
            if (resto !== digitos[10]) {
                el.textContent = '❌ CPF Inválido!';
                el.classList.add('invalido');
                return;
            }

            el.textContent = '✅ CPF Válido!';
            el.classList.add('valido');
        }
    </script>
</body>
</html>
