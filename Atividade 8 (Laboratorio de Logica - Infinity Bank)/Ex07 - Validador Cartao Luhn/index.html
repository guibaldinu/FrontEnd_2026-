<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank — Card Guard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 460px;
            width: 100%;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 6px; }
        .sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
            letter-spacing: 4px;
            box-sizing: border-box;
        }
        input:focus { border-color: #2c3e50; outline: none; }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #1a252f; }
        #painel { margin-top: 24px; display: none; }
        .status {
            text-align: center;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .valido   { background-color: #d4edda; color: #155724; }
        .invalido { background-color: #f8d7da; color: #721c24; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .info-item {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .info-item .titulo { font-size: 12px; color: #888; margin-bottom: 4px; }
        .info-item .valor  { font-size: 15px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ Card Guard</h1>
        <p class="sub">Infinity Bank — Validador de Segurança</p>

        <label>Número do Cartão</label>
        <input type="text" id="cartaoInput" placeholder="0000 0000 0000 0000"
               maxlength="19" oninput="mascararCartao(this)">
        <button onclick="analisarCartao()">Analisar Cartão</button>

        <div id="painel">
            <div id="statusDiv" class="status"></div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="titulo">Bandeira</div>
                    <div class="valor" id="iBandeira">—</div>
                </div>
                <div class="info-item">
                    <div class="titulo">Setor (IIN)</div>
                    <div class="valor" id="iSetor">—</div>
                </div>
                <div class="info-item">
                    <div class="titulo">Dígitos</div>
                    <div class="valor" id="iDigitos">—</div>
                </div>
                <div class="info-item">
                    <div class="titulo">Soma Luhn</div>
                    <div class="valor" id="iSoma">—</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mascararCartao(input) {
            let v = input.value.replace(/\D/g, '').substring(0, 16);
            v = v.replace(/(.{4})/g, '$1 ').trim();
            input.value = v;
        }

        function analisarCartao() {
            const raw = document.getElementById('cartaoInput').value.replace(/\D/g, '');
            const painel = document.getElementById('painel');
            const statusDiv = document.getElementById('statusDiv');

            if (raw.length < 13 || raw.length > 16) {
                painel.style.display = 'block';
                statusDiv.className = 'status invalido';
                statusDiv.textContent = '❌ Número inválido — deve ter entre 13 e 16 dígitos.';
                document.getElementById('iBandeira').textContent = '—';
                document.getElementById('iSetor').textContent    = '—';
                document.getElementById('iDigitos').textContent  = raw.length + ' dígitos';
                document.getElementById('iSoma').textContent     = '—';
                return;
            }

            // Algoritmo de Luhn
            const digitos = raw.split('').map(Number).reverse();
            const soma    = digitos.reduce((acc, d, i) => {
                if (i % 2 !== 0) { d *= 2; if (d > 9) d -= 9; }
                return acc + d;
            }, 0);
            const valido = soma % 10 === 0;

            // Bandeira
            let bandeira = 'Desconhecida';
            const p2 = parseInt(raw.substring(0, 2));
            if (raw[0] === '4')                      bandeira = 'Visa';
            else if (p2 >= 51 && p2 <= 55)           bandeira = 'Mastercard';
            else if (raw.startsWith('34') || raw.startsWith('37')) bandeira = 'Amex';
            else if (raw.startsWith('6011'))         bandeira = 'Discover';
            else if (raw[0] === '6')                 bandeira = 'Elo / Hipercard';

            // Setor IIN
            const setores = {
                '1': 'Aéreas', '2': 'Aéreas/Fin.',
                '3': 'Viagens', '4': 'Bancário',
                '5': 'Bancário', '6': 'Merchandising',
                '7': 'Petróleo', '8': 'Telecom', '9': 'Nacional'
            };
            const setor = setores[raw[0]] || '—';

            statusDiv.className = 'status ' + (valido ? 'valido' : 'invalido');
            statusDiv.textContent = valido ? '✅ Cartão VÁLIDO — Luhn OK' : '❌ Cartão INVÁLIDO — Luhn falhou';

            document.getElementById('iBandeira').textContent = bandeira;
            document.getElementById('iSetor').textContent    = setor;
            document.getElementById('iDigitos').textContent  = raw.length + ' dígitos';
            document.getElementById('iSoma').textContent     = soma + (valido ? ' ✓' : ' ✗');

            painel.style.display = 'block';
        }
    </script>
</body>
</html>
