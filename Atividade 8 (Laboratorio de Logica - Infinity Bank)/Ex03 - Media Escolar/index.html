<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média Escolar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 24px; }
        label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
            margin-top: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #2c3e50; outline: none; }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #1a252f; }
        #resultado {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        .aprovado  { background-color: #cce5ff; color: #004085; }
        .exame     { background-color: #d4edda; color: #155724; }
        .reprovado { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 Média Escolar</h1>

        <label>Nome do Aluno</label>
        <input type="text" id="nome" placeholder="Digite o nome">

        <label>Nota 1</label>
        <input type="number" id="nota1" min="0" max="10" step="0.1" placeholder="0 a 10">

        <label>Nota 2</label>
        <input type="number" id="nota2" min="0" max="10" step="0.1" placeholder="0 a 10">

        <label>Nota 3</label>
        <input type="number" id="nota3" min="0" max="10" step="0.1" placeholder="0 a 10">

        <button onclick="calcularMedia()">Calcular</button>
        <div id="resultado"></div>
    </div>

    <script>
        function calcularMedia() {
            const nome  = document.getElementById('nome').value.trim() || 'Aluno';
            const n1    = Number(document.getElementById('nota1').value);
            const n2    = Number(document.getElementById('nota2').value);
            const n3    = Number(document.getElementById('nota3').value);
            const media = (n1 + n2 + n3) / 3;

            const el = document.getElementById('resultado');
            el.style.display = 'block';
            el.className = '';

            if (media >= 7.0) {
                el.innerHTML = `✅ ${nome}<br>Média: ${media.toFixed(2)}<br><strong>APROVADO!</strong>`;
                el.classList.add('aprovado');
            } else if (media >= 4.0) {
                const falta = (10 - media).toFixed(2);
                el.innerHTML = `⚠️ ${nome}<br>Média: ${media.toFixed(2)}<br><strong>EXAME</strong><br>Faltam ${falta} pontos para nota 10.`;
                el.classList.add('exame');
            } else {
                el.innerHTML = `❌ ${nome}<br>Média: ${media.toFixed(2)}<br><strong>REPROVADO</strong>`;
                el.classList.add('reprovado');
            }
        }
    </script>
</body>
</html>
