<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank — Taxas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 440px;
            width: 100%;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 6px; }
        .sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
        label {
            display: block;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 14px;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus { border-color: #2c3e50; outline: none; }
        button {
            margin-top: 22px;
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #1a252f; }
        #resultado {
            margin-top: 24px;
            display: none;
        }
        .linha {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .linha:last-child { border-bottom: none; }
        .linha strong { color: #2c3e50; }
        .total {
            margin-top: 8px;
            background-color: #2c3e50;
            color: white;
            padding: 14px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 17px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>💳 Infinity Bank</h1>
        <p class="sub">Simulador de Taxas de Venda</p>

        <label>Bandeira</label>
        <select id="bandeira">
            <option value="visa">Visa (2%)</option>
            <option value="master">Mastercard (1,85%)</option>
            <option value="elo">Elo (3%)</option>
        </select>

        <label>Valor da Venda (R$)</label>
        <input type="number" id="valorVenda" min="0" step="0.01" placeholder="Ex: 500.00">

        <label>Número de Parcelas</label>
        <select id="parcelas">
            <option value="1">1x (à vista)</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="6">6x</option>
            <option value="12">12x</option>
        </select>

        <button onclick="calcularTaxa()">Calcular</button>

        <div id="resultado">
            <div class="linha"><span>Valor da Venda</span>      <strong id="rValor"></strong></div>
            <div class="linha"><span>Taxa da Bandeira</span>    <strong id="rTaxa"></strong></div>
            <div class="linha"><span>Juros das Parcelas</span>  <strong id="rJuros"></strong></div>
            <div class="linha"><span>Taxa Mensal (R$12,50/mês)</span><strong id="rMensal"></strong></div>
            <div class="total"><span>Valor por Parcela</span>   <span id="rParcela"></span></div>
        </div>
    </div>

    <script>
        function calcularTaxa() {
            const valor    = parseFloat(document.getElementById('valorVenda').value);
            const parcelas = parseInt(document.getElementById('parcelas').value);
            const bandeira = document.getElementById('bandeira').value;

            if (!valor || valor <= 0) {
                alert('Informe um valor de venda válido.');
                return;
            }

            let taxaBandeira;
            switch (bandeira) {
                case 'visa':   taxaBandeira = 0.02;   break;
                case 'master': taxaBandeira = 0.0185; break;
                case 'elo':    taxaBandeira = 0.03;   break;
            }

            const valorTaxa    = valor * taxaBandeira;
            const juros        = valor * (0.0035 * parcelas);
            const taxaMensal   = 12.50 * parcelas;
            const valorTotal   = valor + valorTaxa + juros + taxaMensal;
            const valorParcela = valorTotal / parcelas;

            document.getElementById('rValor').textContent   = 'R$ ' + valor.toFixed(2);
            document.getElementById('rTaxa').textContent    = 'R$ ' + valorTaxa.toFixed(2);
            document.getElementById('rJuros').textContent   = 'R$ ' + juros.toFixed(2);
            document.getElementById('rMensal').textContent  = 'R$ ' + taxaMensal.toFixed(2);
            document.getElementById('rParcela').textContent = parcelas + 'x de R$ ' + valorParcela.toFixed(2);

            document.getElementById('resultado').style.display = 'block';
        }
    </script>
</body>
</html>
